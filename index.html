<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#eb2928">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Lantern Mart</title>
<style>
  :root{ --red:#eb2928; --bg:#f5f5f7; --card:#fff; --ink:#1c1c1e; --mut:#8a8a8e; --line:#e6e6ea; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--ink); }
  .hide{ display:none!important; } .red{ color:var(--red); } .mut{ color:var(--mut); }
  button{ font:inherit; cursor:pointer; border:none; }
  input,select{ font:inherit; width:100%; padding:11px; border:1px solid var(--line); border-radius:10px; background:#fff; margin-top:4px; }
  label{ font-size:13px; color:var(--mut); display:block; margin-top:10px; }
  .btn{ background:var(--red); color:#fff; padding:12px; border-radius:12px; font-weight:600; width:100%; font-size:15px; margin-top:14px; }
  .btn.ghost{ background:#fff; color:var(--red); border:1px solid var(--red); }
  .btn.grey{ background:#e9e9ee; color:var(--ink); }
  .btn.sm{ width:auto; padding:7px 12px; margin:0; font-size:13px; }
  .card{ background:var(--card); border-radius:14px; padding:15px; margin:12px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
  .row{ display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .tag{ font-size:11px; padding:2px 8px; border-radius:20px; background:#f0f0f4; color:var(--mut); white-space:nowrap; }
  .tag.Sat{background:#fff3e0;color:#e67700}.tag.Sun{background:#ffebee;color:#c62828}.tag.PH{background:#ede7f6;color:#5e35b1}
  .tag.Pending,.tag.Requested{background:#fff8e1;color:#b8860b}.tag.Approved,.tag.Ordered,.tag.Picked{background:#e8f5e9;color:#2e7d32}
  .tag.Rejected,.tag.low{background:#ffebee;color:#c62828}
  #login{ max-width:420px; margin:0 auto; padding:calc(env(safe-area-inset-top) + 30px) 24px 40px; text-align:center; }
  #login img{ width:120px; }
  .staff-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:22px; }
  .staff-btn{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px 10px; font-size:16px; font-weight:600; box-shadow:0 1px 3px rgba(0,0,0,.05); }
  .staff-btn .b{ display:block; font-size:12px; color:var(--mut); font-weight:400; margin-top:4px; text-transform:capitalize; }
  #pinpad .who{ font-size:20px; font-weight:700; margin:18px 0 2px; }
  .dots{ display:flex; justify-content:center; gap:16px; margin:22px 0; min-height:18px; }
  .dot{ width:15px; height:15px; border-radius:50%; border:2px solid var(--red); } .dot.on{ background:var(--red); }
  .keys{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; max-width:290px; margin:0 auto; }
  .key{ background:#fff; border:1px solid var(--line); border-radius:50%; aspect-ratio:1; font-size:25px; display:flex; align-items:center; justify-content:center; box-shadow:0 1px 3px rgba(0,0,0,.05); }
  .key.blank{ background:none; border:none; box-shadow:none; } .key:active{ background:#f0f0f4; }
  .shake{ animation:shk .3s; } @keyframes shk{ 0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)} }
  header{ background:var(--red); color:#fff; padding:calc(env(safe-area-inset-top) + 13px) 16px 13px; position:sticky; top:0; z-index:5; display:flex; align-items:center; gap:12px; }
  header .burger{ background:rgba(255,255,255,.2); color:#fff; width:38px; height:38px; border-radius:10px; font-size:18px; }
  header .name{ font-weight:600; } header .sub{ font-size:12px; opacity:.85; text-transform:capitalize; } header .grow{ flex:1; }
  #overlay{ position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:20; opacity:0; transition:.25s; pointer-events:none; }
  #overlay.show{ opacity:1; pointer-events:auto; }
  #sidebar{ position:fixed; top:0; left:0; bottom:0; width:250px; background:#fff; z-index:21; transform:translateX(-100%); transition:transform .25s; box-shadow:2px 0 12px rgba(0,0,0,.15); display:flex; flex-direction:column; padding-top:env(safe-area-inset-top); }
  #sidebar.show{ transform:translateX(0); }
  #sidebar .head{ background:var(--red); color:#fff; padding:20px 18px; }
  #sidebar .head .n{ font-weight:700; font-size:17px; } #sidebar .head .r{ font-size:12px; opacity:.85; text-transform:capitalize; }
  #sidebar .items{ flex:1; overflow:auto; padding:8px 0; }
  #sidebar .items button{ display:flex; align-items:center; gap:14px; width:100%; background:none; padding:14px 20px; font-size:15px; color:var(--ink); text-align:left; }
  #sidebar .items button.on{ color:var(--red); background:#fff5f5; font-weight:600; }
  #sidebar .items button .ic{ font-size:20px; width:24px; text-align:center; }
  #sidebar .logout{ margin:12px 16px 6px; }
  #sidebar .ver{ text-align:center; font-size:12px; color:var(--mut); padding-bottom:calc(env(safe-area-inset-bottom) + 14px); }
  main{ padding-bottom:40px; min-height:60vh; }
  h2{ margin:16px 16px 4px; font-size:20px; } .sec{ font-size:13px; color:var(--mut); margin:10px 16px 0; }
  .big{ font-size:34px; font-weight:700; }
  .list div.item{ padding:11px 0; border-bottom:1px solid var(--line); } .list div.item:last-child{ border:none; }
  #banner{ background:#111; color:#fff; text-align:center; padding:10px; font-size:14px; }
  #banner button{ background:var(--red); color:#fff; padding:6px 14px; border-radius:8px; margin-left:8px; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  video{ width:100%; border-radius:12px; background:#000; }
  .empty{ text-align:center; color:var(--mut); padding:26px; }
  .chip{ display:inline-block; font-size:12px; background:#f0f0f4; border-radius:8px; padding:3px 8px; margin:2px 4px 0 0; }
</style>
</head>

<script>
/* ===== CONFIG ===== */
const APP_VER = '1.1.0';   // keep in sync with version.json + sw.js CACHE_NAME
const API = 'https://script.google.com/macros/s/AKfycbyTtUb-gze_CSSIVzDHq3d9QHeKZRcPVA6SgyCMcnMvwV-oAZTtFd01c2oq1LD1z-0-/exec';

/* ===== STATE ===== */
let S = null;              // { username, role, fullname, allowedMenus }
let meUser = null;         // full record (rates) of the logged-in user
let holidays = [];         // ['YYYY-MM-DD', ...]
let tsOffset = 0, sumOffset = 0, attOffset = 0;
let pinBuf = '', pinLen = 4, selUser = null;

/* ===== API (GET-based, username-based auth like Wrap&Roll) ===== */
async function api(action, params={}){
  const p = { action, ...params };
  if (S && S.username){ p.actingUser = S.username; if (p.username === undefined) p.username = S.username; }
  Object.keys(p).forEach(k => { if (p[k] === undefined || p[k] === null) p[k] = ''; });
  const res = await fetch(API + '?' + new URLSearchParams(p).toString());
  return await res.json();
}

/* ===== SESSION ===== */
function saveSession(){ localStorage.setItem('lm_session', JSON.stringify(S)); }
function loadSession(){ try{ return JSON.parse(localStorage.getItem('lm_session')); }catch(e){ return null; } }

/* ===== LOGIN ===== */
async function loadPicker(){
  const grid = document.getElementById('staff-grid');
  try{
    const r = await api('getLoginUsers');
    const users = (r && r.data) || [];
    if(!users.length){ grid.innerHTML='<p class="empty">No staff yet</p>'; return; }
    grid.innerHTML = users.map(u => `<button class="staff-btn"
      onclick='pickUser(${JSON.stringify(u)})'>${u.fullname||u.username}<span class="b">${u.role}</span></button>`).join('');

/* ===== date + pay helpers ===== */
function todayStr(){ return new Date().toLocaleDateString('en-CA'); } // YYYY-MM-DD local
function weekStart(dateStr){ const d=new Date(dateStr+'T00:00:00'); const off=(d.getDay()+6)%7; d.setDate(d.getDate()-off); return d.toLocaleDateString('en-CA'); }
function addDays(dateStr,n){ const d=new Date(dateStr+'T00:00:00'); d.setDate(d.getDate()+n); return d.toLocaleDateString('en-CA'); }
function dayType(dateStr){ if(holidays.includes(dateStr)) return 'PH'; const w=new Date(dateStr+'T00:00:00').getDay(); if(w===6)return 'Sat'; if(w===0)return 'Sun'; return 'Weekday'; }
function multFor(type,u){ if(type==='Sat')return u.satRate||1; if(type==='Sun')return u.sunRate||1; if(type==='PH')return u.phRate||1; return 1; }
function payFor(rec,u){ const t=(rec.rateMode==='hourly')?'Weekday':dayType(rec.date); const m=multFor(t,u); return { type:t, mult:m, pay:(rec.hoursWorked||0)*(u.hourlyRate||0)*m }; }

async function viewPayslip(){
  if(!meUser){ el('<p class="empty">No pay rate set for your account. Ask admin.</p>'); return; }
  const ws=addDays(weekStart(todayStr()), tsOffset*7), we=addDays(ws,6);
  const r=await api('getAttendance',{ username:S.username, dateFrom:ws, dateTo:we });
  let recs=(r.data||[]).filter(x=>x.checkOut);
  let totH=0, totP=0;
  const rows=recs.map(x=>{ const p=payFor(x,meUser); totH+=x.hoursWorked||0; totP+=p.pay;
    return `<div class="item"><div class="row"><div><b>${x.date}</b> <span class="tag ${p.type}">${p.type} ×${p.mult}</span><br>
      <span class="mut">${x.checkIn}–${x.checkOut} · ${x.hoursWorked}h · ${x.status}</span></div><b>${money(p.pay)}</b></div></div>`;
  }).join('') || '<p class="empty">No shifts this week</p>';
  el(`<h2>Weekly payslip</h2>
    <div class="card"><div class="row">
      <button class="btn grey sm" onclick="tsOffset--;go('payslip')">‹</button>
      <span>${ws} → ${we}</span>
      <button class="btn grey sm" onclick="if(tsOffset<0){tsOffset++;go('payslip')}">›</button></div>
      <p class="mut" style="margin:8px 0 0">Rate ${money(meUser.hourlyRate)}/h · Sat ×${meUser.satRate} · Sun ×${meUser.sunRate} · PH ×${meUser.phRate}</p></div>
    <div class="card list">${rows}
      <div class="row" style="padding-top:12px;font-size:18px"><b>Total ${totH.toFixed(2)}h</b><b class="red">${money(totP)}</b></div></div>
    <button class="btn ghost" style="margin:0 16px 16px;width:auto" onclick="payHistory()">8-week history</button>`);
}
async function payHistory(){
  const ws0=weekStart(todayStr()); let html='';
  for(let i=0;i<8;i++){
    const ws=addDays(ws0,-i*7), we=addDays(ws,6);
    const r=await api('getAttendance',{ username:S.username, dateFrom:ws, dateTo:we });
    let h=0,pay=0; (r.data||[]).filter(x=>x.checkOut).forEach(x=>{ h+=x.hoursWorked||0; pay+=payFor(x,meUser).pay; });
    html+=`<div class="item row"><span>${ws}</span><span>${h.toFixed(2)}h · <b>${money(pay)}</b></span></div>`;
  }
  el(`<h2>Pay history</h2><div class="card list">${html}</div>
    <button class="btn grey" style="margin:0 16px" onclick="go('payslip')">‹ Back</button>`);
}

async function viewScan(){

async function startScan(){
  if(!('BarcodeDetector' in window)){ alert('This device does not support auto scan. Please type it in.'); return; }
  const v=document.getElementById('cam');
  const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
  v.srcObject=stream; await v.play();
  const det=new BarcodeDetector();
  const loop=async()=>{ if(!v.srcObject)return;
    try{ const c=await det.detect(v); if(c.length){ document.getElementById('sc-q').value=c[0].rawValue; stream.getTracks().forEach(t=>t.stop()); v.srcObject=null; lookup(); return; } }catch(e){}
    requestAnimationFrame(loop); };
  loop();
}
async function lookup(){
  const q=V('sc-q'); if(!q)return;
  const r=await api('lookupBySKU',{ sku:q }); const p=r.item||r.data;
  document.getElementById('sc-res').innerHTML = (r.ok && p)
    ? `<div class="card"><b>${p.name}</b><p class="mut">SKU ${p.sku} · ${p.cat||''}</p>

    : `<p class="empty">No match for “${q}”</p>`;
}

        <button class="btn grey sm" onclick="attDel('${x.id}')">Delete</button></div>
    </div>`).join('') || '<p class="empty">No attendance this week</p>';
  el(`<h2>Attendance</h2>
    <div class="card"><div class="row">
      <button class="btn grey sm" onclick="attOffset--;go('attend')">‹</button><span>${ws} → ${we}</span>
      <button class="btn grey sm" onclick="if(attOffset<0){attOffset++;go('attend')}">›</button></div></div>
    <div class="card list">${rows}</div>`);
}
async function attApprove(id){ const r=await api('approveAttendance',{ id }); if(!r.ok)alert(r.msg||'Error'); go('attend'); }
async function attDel(id){ if(!confirm('Delete this record?'))return; await api('deleteAttendance',{ id }); go('attend'); }
function attEdit(id,ci,co){
  const nci=prompt('Check-in (HH:MM)',ci||'09:00'); if(nci===null)return;
  const nco=prompt('Check-out (HH:MM)',co||'17:00'); if(nco===null)return;
  api('modifyAttendance',{ id, checkIn:nci, checkOut:nco, note:'edited' }).then(r=>{ if(!r.ok)alert(r.msg||'Error'); go('attend'); });
}

/* ===== ADMIN (users + payroll summary + switch user) ===== */
async function viewAdmin(){
  el(`<h2>Admin</h2>
    <div class="card"><b>Staff</b><div id="u-list" class="list" style="margin-top:8px"></div>
      <button class="btn ghost" onclick="userForm()">+ Add staff</button></div>
    <div class="card"><b>Payroll summary</b>
      <div class="row" style="margin-top:8px"><button class="btn grey sm" onclick="sumOffset--;loadSum()">‹</button>
        <span id="sum-week"></span><button class="btn grey sm" onclick="if(sumOffset<0){sumOffset++;loadSum()}">›</button></div>
      <div id="sum-list" class="list" style="margin-top:8px"></div></div>`);
  loadUsers(); loadSum();
}
async function loadUsers(){
  const r=await api('getUsers');
  document.getElementById('u-list').innerHTML=(r.data||[]).map(u=>`<div class="item row">
    <span>${u.fullname||u.username} <span class="tag">${u.role}</span>${u.active!=='TRUE'?' <span class="tag Rejected">off</span>':''}<br>
    <span class="mut">${u.username} · ${money(u.hourlyRate)}/h</span></span>
    <button class="btn grey sm" onclick='userForm(${JSON.stringify(u)})'>Edit</button></div>`).join('');
}
function userForm(u){
  const n=u||{ username:'', fullname:'', role:'staff', hourlyRate:'', satRate:1.25, sunRate:1.5, phRate:2.0, superRate:11.5, empType:'casual', allowedMenus:'' };
  el(`<h2>${u?'Edit':'Add'} staff</h2><div class="card">
    <label>Username (login)</label><input id="u-username" value="${n.username}" ${u?'readonly':''}>
    <label>Full name</label><input id="u-fullname" value="${n.fullname||''}">
    <label>PIN ${u?'(blank = keep)':''}</label><input id="u-pin" inputmode="numeric" placeholder="4 or 6 digits">
    <label>Role</label><select id="u-role">${['viewer','staff','mod','admin'].map(r=>`<option ${n.role===r?'selected':''}>${r}</option>`).join('')}</select>
    <label>Hourly rate ($)</label><input id="u-rate" inputmode="decimal" value="${n.hourlyRate||''}">
    <div class="grid2"><div><label>Sat ×</label><input id="u-sat" inputmode="decimal" value="${n.satRate}"></div>
    <div><label>Sun ×</label><input id="u-sun" inputmode="decimal" value="${n.sunRate}"></div></div>
    <div class="grid2"><div><label>PH ×</label><input id="u-ph" inputmode="decimal" value="${n.phRate}"></div>
    <div><label>Super %</label><input id="u-super" inputmode="decimal" value="${n.superRate}"></div></div>
    <label>Allowed menus for mod (comma: orders,picking,attend)</label><input id="u-menus" value="${n.allowedMenus||''}">
    <button class="btn" onclick="saveUser(${u?'true':'false'})">Save</button>
    ${u && u.username!=='admin'?`<button class="btn grey" onclick="delUser('${n.username}')">Deactivate/Delete</button>`:''}
    <button class="btn ghost" onclick="go('admin')">Cancel</button></div>`);
}
async function saveUser(isEdit){
  const base={ username:V('u-username'), fullname:V('u-fullname'), role:V('u-role'), hourlyRate:V('u-rate'),
    satRate:V('u-sat'), sunRate:V('u-sun'), phRate:V('u-ph'), superRate:V('u-super'), allowedMenus:V('u-menus') };
  const pin=V('u-pin');
  let r;
  if(isEdit){ r=await api('updateUser', Object.assign(base, pin?{password:pin}:{})); }
  else { if(!base.username||!pin){ alert('Username and PIN required'); return; } r=await api('addUser', Object.assign(base,{password:pin})); }
  if(!r.ok)alert(r.msg||'Error'); go('admin');
}
async function delUser(username){ if(!confirm('Delete '+username+'?'))return; const r=await api('deleteUser',{ username }); if(!r.ok)alert(r.msg||'Error'); go('admin'); }
async function loadSum(){
  const ws=addDays(weekStart(todayStr()), sumOffset*7), we=addDays(ws,6);
  document.getElementById('sum-week').textContent=ws+' → '+we;
  const [u,a]=await Promise.all([api('getUsers'),api('getAttendance',{ username:'', dateFrom:ws, dateTo:we })]);
  const users={}; (u.data||[]).forEach(x=>users[x.username.toLowerCase()]=x);
  const agg={};
  (a.data||[]).filter(x=>x.checkOut).forEach(x=>{ const key=x.username.toLowerCase(); const uu=users[key]; if(!uu)return;
    const p=payFor(x,uu); if(!agg[key])agg[key]={name:uu.fullname||uu.username,h:0,pay:0,sup:uu.superRate||11.5}; agg[key].h+=x.hoursWorked||0; agg[key].pay+=p.pay; });
  let gross=0,supTot=0;
  const rows=Object.values(agg).map(g=>{ const sup=g.pay*(g.sup/100); gross+=g.pay; supTot+=sup;
    return `<div class="item row"><span>${g.name}<br><span class="mut">${g.h.toFixed(2)}h</span></span>
      <span>${money(g.pay)}<br><span class="mut">super ${money(sup)}</span></span></div>`; }).join('')||'<p class="empty">No data</p>';
  document.getElementById('sum-list').innerHTML=rows+`<div class="item row" style="font-size:17px"><b>Gross</b><b class="red">${money(gross)}</b></div>
    <div class="item row"><span class="mut">Super total</span><span class="mut">${money(supTot)}</span></div>`;
}

/* ===== SWITCH USER ===== */
function isImpersonating(){ return !!localStorage.getItem('lm_admin'); }
async function switchUserView(){
  const r=await api('getUsers');
  el(`<h2>Switch user</h2><p class="sec">Act as another user (no PIN needed).</p><div class="card list">
    ${(r.data||[]).map(u=>`<button class="btn grey" style="text-align:left;margin-top:8px"
      onclick='doSwitch(${JSON.stringify(u)})'>${u.fullname||u.username} · ${u.role}</button>`).join('')}</div>
    <button class="btn ghost" style="margin:0 16px" onclick="go('admin')">‹ Back</button>`);
}
async function doSwitch(u){
  if(!localStorage.getItem('lm_admin')) localStorage.setItem('lm_admin', JSON.stringify(S));
  S={ username:u.username, role:u.role, fullname:u.fullname, allowedMenus:u.allowedMenus||'' }; saveSession(); await enterApp();
}
function returnToAdmin(){ const a=JSON.parse(localStorage.getItem('lm_admin')||'null'); if(!a)return; localStorage.removeItem('lm_admin'); S=a; saveSession(); enterApp(); }

/* ===== SETTINGS (admin) ===== */
async function viewSettings(){
  const [h,e]=await Promise.all([api('getHolidays'),api('getReportEmail')]);
  el(`<h2>Settings</h2>
    <div class="card"><b>Public holidays (PH ×rate)</b>
      <label>Comma-separated YYYY-MM-DD</label><input id="set-hol" value="${(h.data||[]).join(',')}">
      <button class="btn" onclick="saveHol()">Save holidays</button></div>
    <div class="card"><b>Report email</b>
      <label>Email for stocktake/timesheet reports</label><input id="set-email" value="${(e.email)||''}">
      <button class="btn" onclick="saveEmail()">Save email</button>
      <button class="btn ghost" onclick="emailStock()">Email today's stocktake</button></div>
    <div class="card"><b>Lightspeed sync</b>
      <label>LS Account ID</label><input id="ls-acct">
      <label>LS Personal Token</label><input id="ls-tok" placeholder="(leave blank to keep)">
      <button class="btn ghost" onclick="saveLS()">Save credentials</button>
      <button class="btn" onclick="doSyncLS()">Sync products now</button>
      <p id="ls-res" class="mut"></p></div>`);
}
async function saveHol(){ const r=await api('setHolidays',{ list:V('set-hol') }); if(r.ok){ holidays=V('set-hol').split(',').map(s=>s.trim()).filter(Boolean); } alert(r.ok?'Saved':(r.msg||'Error')); }
async function saveEmail(){ const r=await api('setReportEmail',{ email:V('set-email') }); alert(r.ok?'Saved':(r.msg||'Error')); }
async function emailStock(){ const r=await api('emailStocktakeReport',{ date:todayStr(), email:V('set-email') }); alert(r.ok?'Sent':(r.msg||'Error (run authorizeReportEmail once in Apps Script)')); }
async function saveLS(){ const r=await api('setLightspeed',{ account:V('ls-acct'), token:V('ls-tok') }); alert(r.ok?'Saved':(r.msg||'Error')); }
async function doSyncLS(){ document.getElementById('ls-res').textContent='Syncing…'; const r=await api('lightspeedSync',{}); document.getElementById('ls-res').textContent=r.ok?`Added ${r.added}, updated ${r.updated}`:(r.msg||'Error'); }

/* ===== VERSION + SW ===== */
async function checkVersion(){
  try{ const r=await fetch('version.json?t='+Date.now()); const v=await r.json();
    if(v.version && v.version!==APP_VER){
      if(sessionStorage.getItem('lm_reloaded')!==v.version){ sessionStorage.setItem('lm_reloaded',v.version); hardRefresh(); return; }
      document.getElementById('banner').classList.remove('hide');
    }
  }catch(e){}
}
function hardRefresh(){
  if('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister()));
  caches.keys().then(ks=>ks.forEach(k=>caches.delete(k))).then(()=>location.reload(true));
}

/* ===== BOOT ===== */
window.addEventListener('DOMContentLoaded', async ()=>{
  const saved=loadSession();
  if(saved && saved.username){
    S=saved;
    try{ const r=await api('revalidateSession',{ username:S.username });
      if(r && r.ok){ S={ username:r.username, role:r.role, fullname:r.fullname, allowedMenus:r.allowedMenus||'' }; saveSession(); await enterApp(); }
      else logout();
    }catch(e){ await enterApp(); } // offline: use cached session
  } else loadPicker();
  checkVersion();
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
});
</script>
