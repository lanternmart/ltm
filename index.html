<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#eb2928">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Lantern Mart</title>
<style>
  :root{ --red:#eb2928; --bg:#f5f5f7; --card:#fff; --ink:#1c1c1e; --mut:#8a8a8e; --line:#e6e6ea; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--ink); padding-bottom:env(safe-area-inset-bottom); }
  .hide{ display:none!important; }
  .red{ color:var(--red); } .mut{ color:var(--mut); }
  button{ font:inherit; cursor:pointer; border:none; }
  input,select{ font:inherit; width:100%; padding:12px; border:1px solid var(--line);
    border-radius:10px; background:#fff; margin-top:4px; }
  label{ font-size:13px; color:var(--mut); display:block; margin-top:12px; }
  .btn{ background:var(--red); color:#fff; padding:13px; border-radius:12px; font-weight:600;
    width:100%; font-size:16px; margin-top:16px; }
  .btn.ghost{ background:#fff; color:var(--red); border:1px solid var(--red); }
  .btn.grey{ background:#e9e9ee; color:var(--ink); }
  .card{ background:var(--card); border-radius:14px; padding:16px; margin:12px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
  .row{ display:flex; justify-content:space-between; align-items:center; }
  .tag{ font-size:11px; padding:2px 8px; border-radius:20px; background:#f0f0f4; color:var(--mut); }
  .tag.Sat{background:#fff3e0;color:#e67700}.tag.Sun{background:#ffebee;color:#c62828}
  .tag.PH{background:#ede7f6;color:#5e35b1}
  /* Login */
  #login{ max-width:380px; margin:0 auto; padding:40px 24px; text-align:center; }
  #login img{ width:150px; }
  /* Header */
  header{ background:var(--red); color:#fff; padding:calc(env(safe-area-inset-top) + 14px) 16px 14px;
    position:sticky; top:0; z-index:5; display:flex; justify-content:space-between; align-items:center; }
  header .name{ font-weight:600; } header .sub{ font-size:12px; opacity:.85; }
  header button{ background:rgba(255,255,255,.2); color:#fff; padding:8px 12px; border-radius:10px; font-size:13px; }
  /* Nav */
  nav{ position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--line);
    display:flex; padding-bottom:env(safe-area-inset-bottom); z-index:5; }
  nav button{ flex:1; background:none; padding:8px 2px; font-size:10px; color:var(--mut); }
  nav button.on{ color:var(--red); } nav button .ic{ font-size:20px; display:block; }
  main{ padding-bottom:80px; min-height:60vh; }
  h2{ margin:16px 16px 4px; font-size:20px; } .sec{ font-size:13px; color:var(--mut); margin:0 16px; }
  .big{ font-size:34px; font-weight:700; } .list div.item{ padding:12px 0; border-bottom:1px solid var(--line); }
  .list div.item:last-child{ border:none; }
  /* Banner */
  #banner{ background:#111; color:#fff; text-align:center; padding:10px; font-size:14px; }
  #banner button{ background:var(--red); color:#fff; padding:6px 14px; border-radius:8px; margin-left:8px; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  video{ width:100%; border-radius:12px; background:#000; }
  .empty{ text-align:center; color:var(--mut); padding:30px; }
</style>
</head>

  <h2 style="margin:8px 0 24px">Đăng nhập</h2>
  <div style="text-align:left">
    <label>Tên</label><input id="in-name" autocomplete="off" placeholder="VD: Admin">
    <label>PIN</label><input id="in-pin" type="password" inputmode="numeric" placeholder="••••">
  </div>
  <button class="btn" onclick="doLogin()">Đăng nhập</button>
  <p id="login-err" class="red" style="min-height:20px;font-size:14px"></p>
</div>

<!-- APP -->
<div id="app" class="hide">
  <div id="banner" class="hide">Có bản cập nhật mới
    <button onclick="hardRefresh()">Cập nhật</button></div>
  <header>
    <div><div class="name" id="h-name">—</div><div class="sub" id="h-sub">—</div></div>
    <button onclick="logout()">Đăng xuất</button>
  </header>
  <main id="view"></main>
  <nav id="nav"></nav>
</div>

<script>
/* ===== CONFIG ===== */
const APP_VER = '1.0.0';                       // ⚠ khớp version.json + sw.js CACHE_NAME
const API = 'https://script.google.com/macros/s/AKfycbyTtUb-gze_CSSIVzDHq3d9QHeKZRcPVA6SgyCMcnMvwV-oAZTtFd01c2oq1LD1z-0-/exec';

/* ===== STATE ===== */
let S = { token:null, user:null };            // session
let tsOffset = 0;                             // timesheet week offset

/* ===== API (GET-based, tránh CORS preflight) ===== */
async function api(action, params={}){
  const q = new URLSearchParams({ action, token:S.token||'', ...params });
  const res = await fetch(API + '?' + q.toString());
  const data = await res.json();
  if (data.error === 'unauthorized'){ logout(); throw new Error('Hết phiên'); }
  return data;
}

/* ===== SESSION ===== */
function saveSession(){ localStorage.setItem('lm_session', JSON.stringify(S)); }
function loadSession(){ try{ return JSON.parse(localStorage.getItem('lm_session')); }catch(e){ return null; } }

async function doLogin(){
  const name=document.getElementById('in-name').value.trim();
  const pin=document.getElementById('in-pin').value.trim();
  const err=document.getElementById('login-err'); err.textContent='';
  if(!name||!pin){ err.textContent='Nhập tên và PIN'; return; }
  try{
    const r = await api('login', { name, pin });
    if(r.error){ err.textContent='Sai tên hoặc PIN'; return; }
    S={ token:r.token, user:r.user }; saveSession(); enterApp();
  }catch(e){ err.textContent='Lỗi kết nối. Kiểm tra URL API.'; }
}
function logout(){ localStorage.removeItem('lm_session'); S={token:null,user:null};
  document.getElementById('app').classList.add('hide');
  document.getElementById('login').classList.remove('hide'); }

/* ===== ROLE / NAV ===== */
const LEVEL={ staff:1, manager:2, admin:3 };
const TABS=[
  { id:'home',    ic:'🕐', label:'Chấm công', min:1, fn:viewHome },
  { id:'time',    ic:'📋', label:'Bảng lương', min:1, fn:viewTimesheet },
  { id:'scan',    ic:'📷', label:'Scan',       min:1, fn:viewScan },
  { id:'stock',   ic:'📦', label:'Kho',        min:2, fn:viewStock },
  { id:'orders',  ic:'🧾', label:'Orders',     min:2, fn:viewOrders },
  { id:'cash',    ic:'💵', label:'Cashflow',   min:2, fn:viewCash },
  { id:'admin',   ic:'⚙️', label:'Admin',      min:3, fn:viewAdmin },
];
function can(min){ return LEVEL[S.user.role] >= min; }

function enterApp(){
  document.getElementById('login').classList.add('hide');
  document.getElementById('app').classList.remove('hide');
  document.getElementById('h-name').textContent = S.user.name;
  document.getElementById('h-sub').textContent = S.user.role.toUpperCase()+' · '+(S.user.branch||'');
  const nav=document.getElementById('nav'); nav.innerHTML='';
  TABS.filter(t=>can(t.min)).forEach(t=>{
    const b=document.createElement('button'); b.dataset.id=t.id;
    b.innerHTML=`<span class="ic">${t.ic}</span>${t.label}`;
    b.onclick=()=>go(t.id); nav.appendChild(b);
  });
  go('home');
}
function go(id){
  const tab=TABS.find(t=>t.id===id); if(!tab||!can(tab.min)) return;
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on', b.dataset.id===id));
  document.getElementById('view').innerHTML='<p class="empty">Đang tải…</p>';
  tab.fn();
}
function el(html){ document.getElementById('view').innerHTML=html; }
const money=n=>'$'+(Number(n)||0).toFixed(2);

/* ===== HOME: check in/out ===== */
async function viewHome(){
  const st=await api('clockStatus');
  const inShift = !!st.open;
  el(`<h2>Xin chào ${S.user.name}</h2><p class="sec">${st.date}</p>
    <div class="card" style="text-align:center">
      <p class="mut">Trạng thái</p>
      <p class="big ${inShift?'red':''}">${inShift?'Đang làm':'Chưa vào ca'}</p>
      ${inShift?`<p class="mut">Vào lúc ${st.open.checkIn}</p>`:''}
      <button class="btn ${inShift?'grey':''}" onclick="${inShift?'clockOut()':'clockIn()'}">
        ${inShift?'Check-out (Tan ca)':'Check-in (Vào ca)'}</button>
    </div>
    <div class="card"><div class="row"><b>Yêu cầu chấm công tay</b></div>
      <label>Ngày</label><input id="tr-date" type="date">
      <div class="grid2"><div><label>Bắt đầu</label><input id="tr-s" type="time"></div>
      <div><label>Kết thúc</label><input id="tr-e" type="time"></div></div>
      <label>Lý do</label><input id="tr-r" placeholder="VD: quên chấm công">
      <button class="btn ghost" onclick="submitReq()">Gửi yêu cầu</button></div>`);
}
async function clockIn(){ await api('clockIn',{branch:S.user.branch}); go('home'); }
async function clockOut(){ await api('clockOut'); go('home'); }
async function submitReq(){
  const p={ date:V('tr-date'), start:V('tr-s'), end:V('tr-e'), reason:V('tr-r') };
  if(!p.date||!p.start||!p.end){ alert('Nhập đủ ngày và giờ'); return; }
  await api('timeRequest',p); alert('Đã gửi yêu cầu'); go('home');
}
const V=id=>document.getElementById(id).value;

/* ===== TIMESHEET + PAY HISTORY ===== */
async function viewTimesheet(){
  const t=await api('myTimesheet',{offset:tsOffset});
  const rows=t.rows.map(r=>`<div class="item"><div class="row">
    <div><b>${r.date}</b> <span class="tag ${r.type}">${r.type} ×${r.mult}</span><br>
    <span class="mut">${r.checkIn}–${r.checkOut} · ${r.hours}h</span></div>
    <b>${money(r.pay)}</b></div></div>`).join('') || '<p class="empty">Chưa có ca nào tuần này</p>';
  el(`<h2>Bảng lương tuần</h2>
    <div class="card"><div class="row">
      <button class="btn grey" style="width:auto;padding:8px 14px;margin:0" onclick="tsOffset--;go('time')">‹</button>
      <span>${t.weekStart} → ${t.weekEnd}</span>
      <button class="btn grey" style="width:auto;padding:8px 14px;margin:0" onclick="if(tsOffset<0){tsOffset++;go('time')}">›</button>
    </div>
    <p class="mut" style="margin:8px 0 0">Rate: ${money(t.rate)}/h</p></div>
    <div class="card list">${rows}
      <div class="row" style="padding-top:12px;font-size:18px"><b>Tổng: ${t.totalHours}h</b><b class="red">${money(t.totalPay)}</b></div>
    </div>
    <button class="btn ghost" style="margin:0 16px 16px;width:auto" onclick="payHistory()">Xem lịch sử 8 tuần</button>`);
}
async function payHistory(){
  const h=await api('myPayHistory',{weeks:8});
  const rows=h.history.map(w=>`<div class="item row"><span>${w.weekStart}</span>
    <span>${w.hours}h · <b>${money(w.pay)}</b></span></div>`).join('');
  el(`<h2>Lịch sử lương</h2><div class="card list">${rows}</div>
    <button class="btn grey" style="margin:0 16px" onclick="go('time')">‹ Quay lại</button>`);
}

/* ===== SCAN ===== */
async function viewScan(){
  el(`<h2>Scan sản phẩm</h2>
    <div class="card"><video id="cam" playsinline></video>
    <button class="btn ghost" onclick="startScan()">Bật camera</button>
    <label>Hoặc nhập barcode/SKU</label><input id="sc-q" inputmode="numeric" onkeydown="if(event.key==='Enter')lookup()">
    <button class="btn" onclick="lookup()">Tìm</button></div>
    <div id="sc-res"></div>`);
}
async function startScan(){
  if(!('BarcodeDetector' in window)){ alert('Máy này không hỗ trợ scan tự động. Nhập tay nhé.'); return; }
  const v=document.getElementById('cam');
  const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
  v.srcObject=stream; await v.play();
  const det=new BarcodeDetector();
  const loop=async()=>{ if(!v.srcObject)return;
    try{ const c=await det.detect(v); if(c.length){ document.getElementById('sc-q').value=c[0].rawValue;
      stream.getTracks().forEach(t=>t.stop()); v.srcObject=null; lookup(); return; } }catch(e){}
    requestAnimationFrame(loop); };
  loop();
}
async function lookup(){
  const q=V('sc-q'); if(!q)return;
  const r=await api('productLookup',{q});
  const p=r.product;
  document.getElementById('sc-res').innerHTML = p
    ? `<div class="card"><b>${p.name}</b><p class="mut">SKU ${p.sku} · ${p.barcode}</p>
       <div class="row"><span>Giá ${money(p.price)}</span><span>Tồn: ${p.qty||'—'}</span></div>
       <p class="mut">BB: ${p.bestBefore||'—'} · Expiry: ${p.expiry||'—'}</p></div>`
    : `<p class="empty">Không tìm thấy “${q}”</p>`;
}

/* ===== STOCK / INVENTORY (manager+) ===== */
async function viewStock(){
  const exp=await api('inventoryExp',{days:14});
  const list=await api('productList',{});
  const expRows=exp.expiring.map(p=>`<div class="item row"><span>${p.name}<br><span class="mut">${p.sku}</span></span>
    <span class="red">${p.expiry}</span></div>`).join('') || '<p class="empty">Không có hàng sắp hết hạn</p>';
  const prods=list.products.slice(0,50).map(p=>`<div class="item row"><span>${p.name}<br><span class="mut">${p.sku}</span></span>
    <span>${p.qty||'—'}</span></div>`).join('');
  el(`<h2>Kho hàng</h2>
    <p class="sec">Sắp hết hạn (14 ngày tới)</p>
    <div class="card list">${expRows}</div>
    <p class="sec">Sản phẩm</p>
    <input class="card" style="margin:8px 16px;width:calc(100% - 32px)" placeholder="Tìm tên/SKU…" oninput="stockSearch(this.value)">
    <div class="card list" id="prod-list">${prods}</div>`);
}
let stTimer; function stockSearch(q){ clearTimeout(stTimer); stTimer=setTimeout(async()=>{
  const list=await api('productList',{q});
  document.getElementById('prod-list').innerHTML=list.products.slice(0,50).map(p=>
    `<div class="item row"><span>${p.name}<br><span class="mut">${p.sku}</span></span><span>${p.qty||'—'}</span></div>`
  ).join('')||'<p class="empty">Không có kết quả</p>';
},300); }

/* ===== ORDERS (manager+) ===== */
async function viewOrders(){
  const r=await api('ordersList');
  const rows=r.orders.map(o=>`<div class="item"><div class="row"><b>${o.supplier||'—'}</b>
    <span class="tag">${o.status}</span></div>
    <span class="mut">${o.branch} · ${money(o.total)} · ${(o.createdAt||'').slice(0,10)}</span></div>`).join('')
    || '<p class="empty">Chưa có order</p>';
  el(`<h2>Orders</h2>
    <div class="card"><b>Tạo order mới</b>
      <label>Nhà cung cấp</label><input id="o-sup">
      <label>Tổng tiền</label><input id="o-total" inputmode="decimal">
      <button class="btn" onclick="addOrder()">Tạo order</button></div>
    <div class="card list">${rows}</div>`);
}
async function addOrder(){
  await api('orderAdd',{ supplier:V('o-sup'), total:V('o-total'), branch:S.user.branch });
  go('orders');
}

/* ===== CASHFLOW (manager+) ===== */
async function viewCash(){
  const r=await api('cashflowList',{});
  let bal=0; r.cashflow.forEach(c=>bal+= (c.type==='in'?1:-1)*Number(c.amount||0));
  const rows=r.cashflow.slice(-40).reverse().map(c=>`<div class="item row">
    <span>${c.category||c.type}<br><span class="mut">${c.date} · ${c.branch}</span></span>
    <b class="${c.type==='in'?'':'red'}">${c.type==='in'?'+':'−'}${money(c.amount)}</b></div>`).join('')
    || '<p class="empty">Chưa có giao dịch</p>';
  el(`<h2>Cashflow</h2>
    <div class="card" style="text-align:center"><p class="mut">Số dư</p><p class="big">${money(bal)}</p></div>
    <div class="card"><div class="grid2">
      <div><label>Loại</label><select id="c-type"><option value="in">Thu (in)</option><option value="out">Chi (out)</option></select></div>
      <div><label>Số tiền</label><input id="c-amt" inputmode="decimal"></div></div>
      <label>Danh mục</label><input id="c-cat" placeholder="VD: bán hàng, nhập hàng">
      <button class="btn" onclick="addCash()">Thêm</button></div>
    <div class="card list">${rows}</div>`);
}
async function addCash(){
  await api('cashflowAdd',{ type:V('c-type'), amount:V('c-amt'), category:V('c-cat'), branch:S.user.branch });
  go('cash');
}

/* ===== ADMIN: staff, payroll summary, config, lightspeed ===== */
async function viewAdmin(){
  el(`<h2>Quản trị</h2>
    <div class="card"><b>Quản lý nhân viên</b><div id="staff-list" class="list" style="margin-top:8px"></div>
      <button class="btn ghost" onclick="editStaff()">+ Thêm nhân viên</button></div>
    <div class="card"><b>Bảng lương tổng (tuần này)</b>
      <div id="pay-sum" class="list" style="margin-top:8px"></div></div>
    <div class="card"><b>Đồng bộ Lightspeed</b>
      <button class="btn ghost" onclick="syncLS()">Sync sản phẩm</button>
      <p id="ls-res" class="mut"></p></div>
    <div class="card"><b>Cài đặt (penalty rates & ngày lễ)</b>
      <div id="cfg" style="margin-top:8px"></div></div>`);
  loadStaff(); loadPaySum(); loadCfg();
}
async function loadStaff(){
  const r=await api('staffList');
  document.getElementById('staff-list').innerHTML=r.staff.map(s=>`<div class="item row">
    <span>${s.name} <span class="tag">${s.role}</span><br><span class="mut">${s.branch} · ${money(s.hourlyRate)}/h</span></span>
    <button class="btn grey" style="width:auto;padding:6px 12px;margin:0" onclick='editStaff(${JSON.stringify(s)})'>Sửa</button>
  </div>`).join('');
}
function editStaff(s){
  s=s||{ name:'', pin:'', role:'staff', branch:'Rockhampton', hourlyRate:'', active:'true' };
  el(`<h2>${s.id?'Sửa':'Thêm'} nhân viên</h2><div class="card">
    <label>Tên</label><input id="s-name" value="${s.name||''}">
    <label>PIN</label><input id="s-pin" value="${s.pin||''}">
    <label>Vai trò</label><select id="s-role">
      ${['staff','manager','admin'].map(r=>`<option ${s.role===r?'selected':''}>${r}</option>`).join('')}</select>
    <label>Chi nhánh</label><select id="s-branch">
      ${['Rockhampton','Townsville'].map(b=>`<option ${s.branch===b?'selected':''}>${b}</option>`).join('')}</select>
    <label>Lương/giờ ($)</label><input id="s-rate" inputmode="decimal" value="${s.hourlyRate||''}">
    <button class="btn" onclick='saveStaff(${JSON.stringify(s.id||'')})'>Lưu</button>
    ${s.id?`<button class="btn grey" onclick='delStaff(${JSON.stringify(s.id)})'>Xoá</button>`:''}
    <button class="btn ghost" onclick="go('admin')">Huỷ</button></div>`);
}
async function saveStaff(id){
  await api('staffSave',{ id:id||'', name:V('s-name'), pin:V('s-pin'), role:V('s-role'),
    branch:V('s-branch'), hourlyRate:V('s-rate'), active:'true' });
  go('admin');
}
async function delStaff(id){ if(!confirm('Xoá nhân viên này?'))return; await api('staffDelete',{id}); go('admin'); }
async function loadPaySum(){
  const r=await api('payrollSummary',{offset:0});
  document.getElementById('pay-sum').innerHTML=(r.lines.map(l=>`<div class="item row">
    <span>${l.name}<br><span class="mut">${l.branch} · ${l.hours}h</span></span>
    <span>${money(l.gross)}<br><span class="mut">super ${money(l.superAmt)}</span></span></div>`).join('')||'<p class="empty">Chưa có dữ liệu</p>')
    +`<div class="item row" style="font-size:17px"><b>Gross tổng</b><b class="red">${money(r.gross)}</b></div>`;
}
async function syncLS(){
  document.getElementById('ls-res').textContent='Đang sync…';
  const r=await api('lightspeedSync',{});
  document.getElementById('ls-res').textContent = r.ok ? `Đã sync ${r.synced} sản phẩm`
    : (r.hint || 'Lỗi: '+(r.error||''));
}
async function loadCfg(){
  const r=await api('configGet');
  const keys=['penalty_sat','penalty_sun','penalty_ph','public_holidays','lightspeed_token','lightspeed_account'];
  document.getElementById('cfg').innerHTML=keys.map(k=>`<label>${k}</label>
    <input id="cf-${k}" value="${r.config[k]||''}">`).join('')
    +`<button class="btn" onclick='saveCfg(${JSON.stringify(keys)})'>Lưu cài đặt</button>`;
}
async function saveCfg(keys){
  for(const k of keys){ await api('configSet',{ key:k, value:V('cf-'+k) }); }
  alert('Đã lưu'); go('admin');
}

/* ===== VERSION BANNER + SW ===== */
async function checkVersion(){
  try{ const r=await fetch('version.json?t='+Date.now()); const v=await r.json();
    if(v.version && v.version!==APP_VER) document.getElementById('banner').classList.remove('hide');
  }catch(e){}
}
function hardRefresh(){
  if('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations()
    .then(rs=>rs.forEach(r=>r.unregister()));
  caches.keys().then(ks=>ks.forEach(k=>caches.delete(k))).then(()=>location.reload(true));
}

/* ===== BOOT ===== */
window.addEventListener('DOMContentLoaded',()=>{
  const saved=loadSession();
  if(saved && saved.token){ S=saved; enterApp(); }
  checkVersion();
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
});
</script>
